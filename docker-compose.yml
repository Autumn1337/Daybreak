version: '3.8'

services:
  daybreak:
    build: .
    container_name: daybreak
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=UTC
    restart: unless-stopped
    # Run daily at 8:00 AM UTC (adjust as needed)
    # For one-time run, use: docker-compose run --rm daybreak
    command: ["--hours", "24"]
